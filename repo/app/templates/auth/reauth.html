{% extends "base.html" %}

{% block title %}Re-authenticate - Field Service Manager{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Re-authenticate</h2>
        <p class="auth-subtitle">This action requires you to confirm your identity.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" required autofocus>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Confirm</button>

            <div style="margin-top: 1rem; text-align: center;">
                <a href="{{ url_for('main.index') }}" class="text-muted">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
