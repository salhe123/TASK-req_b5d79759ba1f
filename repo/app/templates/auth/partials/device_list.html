{% if devices %}
    <table class="table">
        <thead>
            <tr>
                <th>Device Name</th>
                <th>Last Used</th>
                <th>Registered</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for device in devices %}
            <tr>
                <td>{{ device.device_name }}</td>
                <td>{{ device.last_used|fmt_datetime or 'Never' }}</td>
                <td>{{ device.created_at|fmt_datetime }}</td>
                <td>
                    <button class="btn btn-danger btn-sm"
                            hx-post="{{ url_for('auth.remove_device', device_id=device.id) }}"
                            hx-target="#device-list"
                            hx-confirm="Remove this trusted device?">
                        Remove
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <div class="card">
        <p>No trusted devices registered.</p>
    </div>
{% endif %}
