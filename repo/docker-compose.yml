services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fieldservice-app
    ports:
      - "5000:5000"
    environment:
      FLASK_CONFIG: production
      SECRET_KEY: ${SECRET_KEY:-a3f8b2c1d4e5f6789012345678abcdef0123456789abcdef0123456789abcdef}
    volumes:
      - app-instance:/app/instance
      - app-uploads:/app/uploads

volumes:
  app-instance:
  app-uploads:
